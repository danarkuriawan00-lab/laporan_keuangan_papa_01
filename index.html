<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Kas Sederhana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: block; }

        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-12" id="app-body">

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 z-[100] bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center px-4 no-print">
        <div class="bg-white w-full max-w-sm p-8 rounded-3xl shadow-2xl">
            <h2 class="text-xl font-bold text-slate-800 mb-6 text-center">Login Admin</h2>
            <form id="login-form" class="space-y-4">
                <input type="password" id="admin-password" placeholder="Masukkan Password Admin" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                <div id="login-error" class="text-rose-500 text-xs hidden text-center">Password salah! (Hint: admin)</div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all">Masuk</button>
                <button type="button" onclick="closeLoginModal()" class="w-full text-slate-400 text-sm hover:text-slate-600">Batal</button>
            </form>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-indigo-600 text-white shadow-lg mb-8 no-print">
        <div class="container mx-auto px-4 py-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Laporan Kas
                </h1>
            </div>
            <div>
                <button id="btn-login-trigger" onclick="openLoginModal()" class="bg-white/10 hover:bg-white/20 px-4 py-2 rounded-lg text-sm font-semibold transition-all">
                    Login Admin
                </button>
                <button id="btn-logout" onclick="logoutAdmin()" class="bg-rose-500 hover:bg-rose-600 px-4 py-2 rounded-lg text-sm font-semibold transition-all hidden">
                    Logout
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4">
        <!-- Dashboard Summary -->
        <div id="dashboard-summary" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm text-slate-500 font-medium">Total Saldo</p>
                <h2 id="total-saldo" class="text-3xl font-bold text-slate-800 mt-1">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm text-emerald-600 font-medium">Pemasukan</p>
                <h2 id="total-pemasukan" class="text-3xl font-bold text-emerald-600 mt-1">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-sm text-rose-600 font-medium">Pengeluaran</p>
                <h2 id="total-pengeluaran" class="text-3xl font-bold text-rose-600 mt-1">Rp 0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Form Input (Admin Only) -->
            <div class="lg:col-span-1 admin-only no-print">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 sticky top-4">
                    <h3 class="text-lg font-semibold text-slate-800 mb-4">Tambah Transaksi</h3>
                    <form id="cash-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tanggal</label>
                            <input type="date" id="input-date" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Keterangan</label>
                            <input type="text" id="input-desc" placeholder="Contoh: Bayar Listrik" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Tipe</label>
                            <select id="input-type" class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                                <option value="pemasukan">Pemasukan</option>
                                <option value="pengeluaran">Pengeluaran</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Nominal (Rp)</label>
                            <input type="number" id="input-amount" placeholder="0" required class="w-full px-4 py-2 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition-colors shadow-md mt-2">
                            Simpan Transaksi
                        </button>
                    </form>
                </div>
            </div>

            <!-- Table -->
            <div id="table-container" class="lg:col-span-3 transition-all">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex flex-col sm:flex-row justify-between items-center gap-4 no-print">
                        <h3 class="text-lg font-semibold text-slate-800">Riwayat Transaksi</h3>
                        <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                            <button onclick="printReport()" class="bg-slate-100 text-slate-600 hover:bg-slate-200 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                                </svg>
                                Cetak PDF
                            </button>
                            <button onclick="downloadCSV()" class="bg-emerald-50 text-emerald-600 hover:bg-emerald-100 px-4 py-2 rounded-lg text-sm font-bold transition-all flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                </svg>
                                CSV
                            </button>
                            <input type="text" id="search-input" placeholder="Cari..." class="px-4 py-2 text-sm rounded-lg border border-slate-200 w-full sm:w-48 focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto max-h-[600px] custom-scroll">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 sticky top-0">
                                <tr>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Tanggal</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Keterangan</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase">Tipe</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-right">Nominal</th>
                                    <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase text-center admin-only no-print">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-list" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                    <div id="empty-state" class="hidden p-12 text-center text-slate-400">Belum ada data.</div>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-8 right-8 bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl transition-all opacity-0 translate-y-10 pointer-events-none z-50 no-print"></div>

    <script>
        const ADMIN_PWD = "admin";
        let transactions = JSON.parse(localStorage.getItem('cash_records')) || [];
        let isAdmin = false;

        const showToast = (msg) => {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            t.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), 3000);
        };

        const formatIDR = (n) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        const openLoginModal = () => document.getElementById('login-modal').classList.replace('hidden', 'flex');
        const closeLoginModal = () => {
            document.getElementById('login-modal').classList.replace('flex', 'hidden');
            document.getElementById('admin-password').value = '';
            document.getElementById('login-error').classList.add('hidden');
        };

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (document.getElementById('admin-password').value === ADMIN_PWD) {
                isAdmin = true;
                updateUI();
                closeLoginModal();
                showToast("Login Berhasil");
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        });

        const logoutAdmin = () => { isAdmin = false; updateUI(); showToast("Logged Out"); };

        function updateUI() {
            document.getElementById('app-body').classList.toggle('is-admin', isAdmin);
            document.getElementById('btn-login-trigger').classList.toggle('hidden', isAdmin);
            document.getElementById('btn-logout').classList.toggle('hidden', !isAdmin);
            document.getElementById('table-container').classList.toggle('lg:col-span-3', !isAdmin);
            document.getElementById('table-container').classList.toggle('lg:col-span-2', isAdmin);
            render();
        }

        function render() {
            const list = document.getElementById('transaction-list');
            const search = document.getElementById('search-input').value.toLowerCase();
            list.innerHTML = '';

            const filtered = transactions
                .filter(t => t.description.toLowerCase().includes(search))
                .sort((a,b) => new Date(b.date) - new Date(a.date));
            
            document.getElementById('empty-state').classList.toggle('hidden', filtered.length > 0);

            filtered.forEach(t => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition-colors";
                const isInc = t.type === 'pemasukan';
                row.innerHTML = `
                    <td class="px-6 py-4 text-sm text-slate-600">${new Date(t.date).toLocaleDateString('id-ID')}</td>
                    <td class="px-6 py-4 text-sm font-medium text-slate-800">${t.description}</td>
                    <td class="px-6 py-4 text-sm">
                        <span class="px-2 py-1 rounded-full text-[10px] font-bold uppercase ${isInc ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">${isInc ? 'Masuk' : 'Keluar'}</span>
                    </td>
                    <td class="px-6 py-4 text-sm font-bold text-right ${isInc ? 'text-emerald-600' : 'text-rose-600'}">${isInc ? '+' : '-'} ${formatIDR(t.amount)}</td>
                    ${isAdmin ? `<td class="px-6 py-4 text-center no-print"><button onclick="remove('${t.id}')" class="text-slate-400 hover:text-rose-600 transition-colors">🗑️</button></td>` : ''}
                `;
                list.appendChild(row);
            });

            const inc = transactions.filter(t => t.type === 'pemasukan').reduce((s, t) => s + t.amount, 0);
            const exp = transactions.filter(t => t.type === 'pengeluaran').reduce((s, t) => s + t.amount, 0);
            document.getElementById('total-pemasukan').textContent = formatIDR(inc);
            document.getElementById('total-pengeluaran').textContent = formatIDR(exp);
            document.getElementById('total-saldo').textContent = formatIDR(inc - exp);
        }

        // Fungsi Cetak yang Diperbaiki: Mengambil SEMUA data riwayat
        function printReport() {
            if (transactions.length === 0) {
                showToast("Tidak ada data untuk dicetak");
                return;
            }

            // Hitung total saldo untuk laporan cetak
            const totalIn = transactions.filter(t => t.type === 'pemasukan').reduce((s, t) => s + t.amount, 0);
            const totalOut = transactions.filter(t => t.type === 'pengeluaran').reduce((s, t) => s + t.amount, 0);
            const balance = totalIn - totalOut;

            // Sort data untuk dicetak (terbaru di atas)
            const sortedData = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date));

            // Bangun baris tabel secara dinamis
            let tableRows = '';
            sortedData.forEach(t => {
                const isInc = t.type === 'pemasukan';
                tableRows += `
                    <tr>
                        <td>${new Date(t.date).toLocaleDateString('id-ID')}</td>
                        <td>${t.description}</td>
                        <td style="text-transform: uppercase; font-size: 10px; font-weight: bold; color: ${isInc ? '#059669' : '#e11d48'}">${isInc ? 'Masuk' : 'Keluar'}</td>
                        <td class="text-right font-bold ${isInc ? 'text-emerald-600' : 'text-rose-600'}">${isInc ? '+' : '-'} ${formatIDR(t.amount)}</td>
                    </tr>
                `;
            });

            const printWindow = window.open('', '_blank', 'width=900,height=700');
            
            printWindow.document.write(`
                <html>
                    <head>
                        <title>Laporan Kas Keuangan Lengkap</title>
                        <script src="https://cdn.tailwindcss.com"><\/script>
                        <style>
                            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
                            body { font-family: 'Inter', sans-serif; padding: 40px; background: white; color: #1e293b; }
                            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                            th { background-color: #f1f5f9 !important; padding: 12px; text-align: left; border-bottom: 2px solid #cbd5e1; font-size: 12px; }
                            td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 12px; }
                            .text-right { text-align: right; }
                            .text-emerald-600 { color: #059669; }
                            .text-rose-600 { color: #e11d48; }
                            .font-bold { font-weight: 700; }
                            .summary-box { display: grid; grid-template-cols: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
                            .card { border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; }
                        </style>
                    </head>
                    <body>
                        <div style="text-align: center; margin-bottom: 30px; border-bottom: 2px solid #1e293b; padding-bottom: 10px;">
                            <h1 style="font-size: 24px; font-weight: bold; margin: 0;">LAPORAN KAS KEUANGAN LENGKAP</h1>
                            <p style="color: #64748b; margin-top: 5px;">Dicetak pada: ${new Date().toLocaleString('id-ID')}</p>
                        </div>

                        <div class="summary-box">
                            <div class="card">
                                <div style="font-size: 12px; color: #64748b;">Total Saldo</div>
                                <div style="font-size: 18px; font-weight: bold;">${formatIDR(balance)}</div>
                            </div>
                            <div class="card">
                                <div style="font-size: 12px; color: #059669;">Pemasukan</div>
                                <div style="font-size: 18px; font-weight: bold; color: #059669;">${formatIDR(totalIn)}</div>
                            </div>
                            <div class="card">
                                <div style="font-size: 12px; color: #e11d48;">Pengeluaran</div>
                                <div style="font-size: 18px; font-weight: bold; color: #e11d48;">${formatIDR(totalOut)}</div>
                            </div>
                        </div>

                        <table>
                            <thead>
                                <tr>
                                    <th>TANGGAL</th>
                                    <th>KETERANGAN</th>
                                    <th>TIPE</th>
                                    <th class="text-right">NOMINAL</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>

                        <div style="margin-top: 50px; text-align: right; font-size: 12px;">
                            <p>Tanda Tangan Bendahara,</p>
                            <br><br><br>
                            <p>( ________________________ )</p>
                        </div>
                    </body>
                </html>
            `);

            printWindow.document.close();
            
            setTimeout(() => {
                printWindow.focus();
                printWindow.print();
                printWindow.close();
            }, 800);
        }

        function downloadCSV() {
            if (transactions.length === 0) {
                showToast("Tidak ada data untuk diunduh");
                return;
            }
            const headers = ["Tanggal", "Keterangan", "Tipe", "Nominal"];
            const rows = [...transactions]
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .map(t => [t.date, `"${t.description.replace(/"/g, '""')}"`, t.type.toUpperCase(), t.amount]);
            
            let csvContent = "\uFEFF" + headers.join(",") + "\r\n";
            rows.forEach(rowArray => { csvContent += rowArray.join(",") + "\r\n"; });
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Laporan_Kas_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("Laporan berhasil diunduh");
        }

        document.getElementById('cash-form').addEventListener('submit', (e) => {
            e.preventDefault();
            transactions.push({
                id: Date.now().toString(),
                date: document.getElementById('input-date').value,
                description: document.getElementById('input-desc').value,
                type: document.getElementById('input-type').value,
                amount: parseFloat(document.getElementById('input-amount').value)
            });
            localStorage.setItem('cash_records', JSON.stringify(transactions));
            e.target.reset();
            document.getElementById('input-date').valueAsDate = new Date();
            render();
            showToast("Tersimpan");
        });

        window.remove = (id) => {
            if(confirm("Hapus transaksi ini?")) {
                transactions = transactions.filter(t => t.id !== id);
                localStorage.setItem('cash_records', JSON.stringify(transactions));
                render();
                showToast("Dihapus");
            }
        };

        document.getElementById('search-input').addEventListener('input', render);
        window.onload = () => { 
            document.getElementById('input-date').valueAsDate = new Date(); 
            render(); 
        };
    </script>
</body>
</html>
